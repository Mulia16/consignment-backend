server:
  port: 8085

spring:
  application:
    name: batch-job-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/consignment_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  sql:
    init:
      mode: never  # digantikan oleh Flyway

flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true
  baseline-version: 0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

batch:
  settlement:
    cron: ${BATCH_SETTLEMENT_CRON:0 0 1 * * *}
  report:
    cron: ${BATCH_REPORT_CRON:0 0 2 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info
