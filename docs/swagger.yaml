components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema: { type: string }
    itemCodePath:
      name: itemCode
      in: path
      required: true
      schema: { type: string }
      example: ITEM001
    companyQuery:
      name: company
      in: query
      schema: { type: string }
      example: COMP01
    storeQuery:
      name: store
      in: query
      schema: { type: string }
      example: STORE01
    supplierCodeQuery:
      name: supplierCode
      in: query
      schema: { type: string }
      example: SUPP001
    supplierContractQuery:
      name: supplierContract
      in: query
      schema: { type: string }
      example: CONTRACT-2024-001
    statusQuery:
      name: status
      in: query
      schema: { type: string }
    fromDateQuery:
      name: fromDate
      in: query
      schema:
        type: string
        format: date
      example: '2024-01-01'
    toDateQuery:
      name: toDate
      in: query
      schema:
        type: string
        format: date
      example: '2024-01-31'

  responses:
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          example:
            error: Unauthorized
    BadRequest:
      description: Validation error or invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    # ── Auth ──────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, example: admin }
        password: { type: string, example: secret123 }

    LoginResponse:
      type: object
      properties:
        token: { type: string, example: eyJhbGciOiJIUzI1NiJ9... }
      example:
        token: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhZG1pbiIsInJvbGVzIjpbIlJPTEVfQURNSU4iXX0.sig"

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, example: john_doe }
        email: { type: string, format: email, example: john@example.com }
        password: { type: string, example: P@ssw0rd! }

    ValidateResponse:
      type: object
      properties:
        valid: { type: boolean }
        username: { type: string }
      example:
        valid: true
        username: "admin"

    MessageResponse:
      type: object
      properties:
        message: { type: string }
      example:
        message: "User registered successfully"

    ApiErrorResponse:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
        timestamp: { type: string, format: date-time }
      example:
        error: "BUSINESS_RULE_VIOLATION"
        message: "Only CSRQ with status HELD can be released"
        timestamp: "2024-01-15T08:00:00Z"

    # ── Master Sync ───────────────────────────
    MasterSyncRequest:
      type: object
      required: [records]
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/MasterSyncRecord'

    MasterSyncRecord:
      type: object
      required: [code]
      properties:
        code: { type: string, example: ITEM001 }
        attributes:
          type: object
          additionalProperties: true
          example:
            hierarchy: ELECTRONICS
            itemModel: Samsung Galaxy S24

    MasterSyncResponse:
      type: object
      properties:
        entity: { type: string, example: items }
        upserted: { type: integer, example: 5 }
        syncedAt: { type: string, format: date-time }
      example:
        entity: "items"
        upserted: 1
        syncedAt: "2024-01-15T08:00:00Z"

    # ── Consignment Setup ─────────────────────
    ConsignmentSetupItemResponse:
      type: object
      properties:
        itemCode: { type: string }
        hierarchy: { type: string }
        itemModel: { type: string }
        syncFlag: { type: boolean }
        externalSuppliers:
          type: array
          items:
            $ref: '#/components/schemas/ExternalSupplierSetupResponse'
        internalSuppliers:
          type: array
          items:
            $ref: '#/components/schemas/InternalSupplierSetupResponse'

    ExternalSupplierSetupRequest:
      type: object
      required: [supplierCode, supplierType, contractNumber, consigneeCompany, consigneeStore]
      properties:
        supplierCode: { type: string, example: SUPP001 }
        supplierType: { type: string, example: EXTERNAL }
        contractNumber: { type: string, example: CONTRACT-2024-001 }
        consigneeCompany: { type: string, example: COMP01 }
        consigneeStore: { type: string, example: STORE01 }
        currentInventoryQty: { type: integer, minimum: 0, default: 0 }

    ExternalSupplierSetupResponse:
      type: object
      properties:
        id: { type: string }
        itemCode: { type: string }
        supplierCode: { type: string }
        supplierType: { type: string }
        supplierContract: { type: string }
        consigneeCompany: { type: string }
        consigneeStore: { type: string }
        currentInventoryQty: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    InternalSupplierSetupRequest:
      type: object
      required: [supplierCode, supplierStore, consigneeCompany, consigneeStore]
      properties:
        supplierCode: { type: string, example: INT-SUPP001 }
        supplierStore: { type: string, example: WAREHOUSE01 }
        consigneeCompany: { type: string, example: COMP01 }
        consigneeStore: { type: string, example: STORE01 }

    InternalSupplierSetupResponse:
      type: object
      properties:
        id: { type: string }
        itemCode: { type: string }
        supplierCode: { type: string }
        supplierStore: { type: string }
        consigneeCompany: { type: string }
        consigneeStore: { type: string }
        createdAt: { type: string, format: date-time }


    # ── CSRQ ─────────────────────────────────
    CsrqRequest:
      type: object
      required: [company, store, supplierCode, supplierContract, createdBy, createdMethod, items]
      properties:
        company: { type: string, example: COMP01 }
        store: { type: string, example: STORE01 }
        supplierCode: { type: string, example: SUPP001 }
        supplierContract: { type: string, example: CONTRACT-2024-001 }
        branch: { type: string }
        internalSupplierStore: { type: string }
        notes: { type: string }
        createdBy: { type: string, example: user01 }
        createdMethod: { type: string, enum: [MANUAL, AUTO], example: MANUAL }
        referenceNo: { type: string }
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CsrqDetailRequest'

    CsrqDetailRequest:
      type: object
      required: [itemCode, requestQty, requestUom]
      properties:
        itemCode: { type: string, example: ITEM001 }
        requestQty: { type: number, minimum: 0.0001, example: 100 }
        requestUom: { type: string, example: PCS }

    CsrqResponse:
      type: object
      properties:
        id: { type: string }
        docNo: { type: string, example: CSRQ-00001 }
        company: { type: string }
        store: { type: string }
        supplierCode: { type: string }
        supplierContract: { type: string }
        branch: { type: string }
        internalSupplierStore: { type: string }
        notes: { type: string }
        status:
          type: string
          enum: [HELD, RELEASED, CANCELLED]
        createdBy: { type: string }
        createdMethod: { type: string }
        referenceNo: { type: string }
        releasedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        items:
          type: array
          items:
            $ref: '#/components/schemas/CsrqResponseDetail'
      example:
        id: "csrq-001"
        docNo: "CSRQ-00001"
        company: "COMP01"
        store: "STORE01"
        supplierCode: "SUPP001"
        supplierContract: "CONTRACT-2024-001"
        notes: "Monthly stock request"
        status: "HELD"
        createdBy: "user01"
        createdMethod: "MANUAL"
        releasedAt: null
        createdAt: "2024-01-15T08:00:00Z"
        updatedAt: "2024-01-15T08:00:00Z"
        items:
          - id: "d-001"
            itemCode: "ITEM001"
            requestQty: 100
            requestUom: "PCS"

    CsrqResponseDetail:
      type: object
      properties:
        id: { type: string }
        itemCode: { type: string }
        requestQty: { type: number }
        requestUom: { type: string }

    # ── CSRV ─────────────────────────────────
    CsrvRequest:
      type: object
      required: [company, receivingStore, supplierCode, supplierContract, createdBy, createdMethod, items]
      properties:
        company: { type: string, example: COMP01 }
        receivingStore: { type: string, example: STORE01 }
        supplierCode: { type: string, example: SUPP001 }
        supplierContract: { type: string, example: CONTRACT-2024-001 }
        branch: { type: string }
        supplierDoNo: { type: string, example: DO-2024-001 }
        deliveryDate: { type: string, format: date, example: '2024-01-15' }
