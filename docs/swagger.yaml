openapi: 3.0.3
info:
  title: Consignment Management System (CMS) API
  description: |
    Complete API specification for the CMS microservices platform.
    All requests go through the API Gateway at port 8080.

    **Authentication**: Most endpoints require a Bearer JWT token obtained from `/auth/login`.
    Include it as: `Authorization: Bearer <token>`

    **Services & Ports**:
    - API Gateway: 8080 (entry point)
    - Auth Service: 8083
    - Consignment Service: 8082
    - Inventory Service: 8081
    - Email Service: 8084
    - Batch Job Service: 8085
    - Service Registry (Eureka): 8761
  version: 1.0.0
  contact:
    name: CMS Platform Team

servers:
  - url: http://localhost:8080
    description: Local via API Gateway

tags:
  - name: Auth
    description: Authentication and token management
  - name: Master Data Sync
    description: ACMM inbound master data synchronization
  - name: Consignment Setup
    description: Item-supplier mapping configuration
  - name: CSRQ
    description: Consignment Stock Request (HELD → RELEASED | CANCELLED)
  - name: CSRV
    description: Consignment Stock Receive (HELD → RELEASED)
  - name: CSO
    description: Customer Stock Order (HELD → RELEASED | ERROR)
  - name: CSDO
    description: Customer Delivery Order (HELD → RELEASED → REVERSED)
  - name: CSR
    description: Customer Stock Return (HELD → RELEASED → COMPLETED)
  - name: CSA
    description: Customer Stock Adjustment (HELD → RELEASED)
  - name: Settlement
    description: Settlement lifecycle (HELD → READY_FOR_BILLING → BILLED → SETTLED)
  - name: Reports
    description: Operational reports R01–R12
  - name: Email
    description: Email notification service
  - name: Batch Jobs
    description: Batch job manual triggers
  - name: Inventory
    description: Inventory availability queries


security:
  - bearerAuth: []

paths:
  # ─────────────────────────────────────────────
  # AUTH SERVICE
  # ─────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login and obtain JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: admin
              password: secret123
      responses:
        '200':
          description: JWT token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiJ9...
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: john_doe
              email: john@example.com
              password: P@ssw0rd!
      responses:
        '200':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: User registered successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/validate:
    post:
      tags: [Auth]
      summary: Validate a JWT token
      security: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          example: Bearer eyJhbGciOiJIUzI1NiJ9...
      responses:
        '200':
          description: Token validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
              example:
                valid: true
                username: admin
        '401':
          description: Invalid token
          content:
            application/json:
              example:
                valid: false


  # ─────────────────────────────────────────────
  # MASTER DATA SYNC
  # ─────────────────────────────────────────────
  /consignment/api/acmm/master-sync/{entity}:
    post:
      tags: [Master Data Sync]
      summary: Sync master data records for a given entity
      description: |
        Supported entities: `items`, `item-prices`, `suppliers`, `contracts`,
        `companies`, `stores`, `customers`, `reasons`
      parameters:
        - name: entity
          in: path
          required: true
          schema:
            type: string
            enum: [items, item-prices, suppliers, contracts, companies, stores, customers, reasons]
          example: items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MasterSyncRequest'
            example:
              records:
                - code: ITEM001
                  attributes:
                    hierarchy: ELECTRONICS
                    itemModel: Samsung Galaxy S24
                    syncFlag: true
      responses:
        '200':
          description: Sync result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MasterSyncResponse'
              example:
                entity: items
                upserted: 1
                syncedAt: '2024-01-15T08:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────────────
  # CONSIGNMENT SETUP
  # ─────────────────────────────────────────────
  /consignment/api/consignment-setup/items:
    get:
      tags: [Consignment Setup]
      summary: List all consignment items
      responses:
        '200':
          description: List of consignment setup items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConsignmentSetupItemResponse'

  /consignment/api/consignment-setup/item/{itemCode}:
    get:
      tags: [Consignment Setup]
      summary: Get consignment setup for a specific item
      parameters:
        - $ref: '#/components/parameters/itemCodePath'
      responses:
        '200':
          description: Item setup detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsignmentSetupItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /consignment/api/consignment-setup/item/{itemCode}/external-supplier:
    post:
      tags: [Consignment Setup]
      summary: Add external supplier mapping to an item
      parameters:
        - $ref: '#/components/parameters/itemCodePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalSupplierSetupRequest'
            example:
              supplierCode: SUPP001
              supplierType: EXTERNAL
              contractNumber: CONTRACT-2024-001
              consigneeCompany: COMP01
              consigneeStore: STORE01
              currentInventoryQty: 0
      responses:
        '200':
          description: External supplier added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalSupplierSetupResponse'

  /consignment/api/consignment-setup/item/{itemCode}/external-supplier/{id}:
    put:
      tags: [Consignment Setup]
      summary: Update external supplier mapping
      parameters:
        - $ref: '#/components/parameters/itemCodePath'
        - $ref: '#/components/parameters/idPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalSupplierSetupRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalSupplierSetupResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Consignment Setup]
      summary: Remove external supplier mapping
      parameters:
        - $ref: '#/components/parameters/itemCodePath'
        - $ref: '#/components/parameters/idPath'
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /consignment/api/consignment-setup/item/{itemCode}/internal-supplier:
    post:
      tags: [Consignment Setup]
      summary: Add internal supplier mapping to an item
      parameters:
        - $ref: '#/components/parameters/itemCodePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalSupplierSetupRequest'
            example:
              supplierCode: INT-SUPP001
              supplierStore: WAREHOUSE01
              consigneeCompany: COMP01
              consigneeStore: STORE01
      responses:
        '200':
          description: Internal supplier added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalSupplierSetupResponse'


  # ─────────────────────────────────────────────
  # CSRQ - Consignment Stock Request
  # ─────────────────────────────────────────────
  /consignment/api/csrq:
    get:
      tags: [CSRQ]
      summary: Search CSRQ documents
      parameters:
        - $ref: '#/components/parameters/companyQuery'
        - $ref: '#/components/parameters/storeQuery'
        - $ref: '#/components/parameters/supplierCodeQuery'
        - $ref: '#/components/parameters/supplierContractQuery'
        - name: branch
          in: query
          schema: { type: string }
        - name: internalSupplierStore
          in: query
          schema: { type: string }
        - name: createdMethod
          in: query
          schema: { type: string }
        - name: referenceNo
          in: query
          schema: { type: string }
        - name: itemCode
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/statusQuery'
      responses:
        '200':
          description: List of CSRQ documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsrqResponse'
    post:
      tags: [CSRQ]
      summary: Create a new CSRQ document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsrqRequest'
            example:
              company: COMP01
              store: STORE01
              supplierCode: SUPP001
              supplierContract: CONTRACT-2024-001
              notes: Monthly stock request
              createdBy: user01
              createdMethod: MANUAL
              items:
                - itemCode: ITEM001
                  requestQty: 100
                  requestUom: PCS
      responses:
        '200':
          description: CSRQ created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrqResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /consignment/api/csrq/{id}:
    get:
      tags: [CSRQ]
      summary: Get CSRQ by ID
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSRQ detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrqResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [CSRQ]
      summary: Delete a CSRQ document (only HELD status)
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /consignment/api/csrq/{id}/release:
    put:
      tags: [CSRQ]
      summary: Release a CSRQ (HELD → RELEASED)
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSRQ released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrqResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────
  # CSRV - Consignment Stock Receive
  # ─────────────────────────────────────────────
  /consignment/api/csrv:
    get:
      tags: [CSRV]
      summary: Search CSRV documents
      parameters:
        - $ref: '#/components/parameters/companyQuery'
        - name: receivingStore
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/supplierCodeQuery'
        - $ref: '#/components/parameters/supplierContractQuery'
        - name: branch
          in: query
          schema: { type: string }
        - name: createdMethod
          in: query
          schema: { type: string }
        - name: referenceNo
          in: query
          schema: { type: string }
        - name: itemCode
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/statusQuery'
      responses:
        '200':
          description: List of CSRV documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsrvResponse'
    post:
      tags: [CSRV]
      summary: Create a new CSRV document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsrvRequest'
            example:
              company: COMP01
              receivingStore: STORE01
              supplierCode: SUPP001
              supplierContract: CONTRACT-2024-001
              supplierDoNo: DO-2024-001
              deliveryDate: '2024-01-15'
              createdBy: user01
              createdMethod: MANUAL
              items:
                - itemCode: ITEM001
                  availableQty: 0
                  requestQty: 100
                  receivingQty: 100
      responses:
        '200':
          description: CSRV created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrvResponse'

  /consignment/api/csrv/{id}:
    get:
      tags: [CSRV]
      summary: Get CSRV by ID
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSRV detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrvResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /consignment/api/csrv/{id}/release:
    put:
      tags: [CSRV]
      summary: Release a CSRV (HELD → RELEASED)
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSRV released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrvResponse'

  /consignment/api/acmm/csrv/auto-create:
    post:
      tags: [CSRV]
      summary: Auto-create CSRV from ACMM integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsrvRequest'
      responses:
        '200':
          description: CSRV auto-created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrvResponse'


  # ─────────────────────────────────────────────
  # CSO - Customer Stock Order
  # ─────────────────────────────────────────────
  /consignment/api/cso:
    get:
      tags: [CSO]
      summary: Search CSO documents
      parameters:
        - $ref: '#/components/parameters/companyQuery'
        - $ref: '#/components/parameters/storeQuery'
        - name: customerCode
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/supplierCodeQuery'
        - $ref: '#/components/parameters/supplierContractQuery'
        - name: createdMethod
          in: query
          schema: { type: string }
        - name: referenceNo
          in: query
          schema: { type: string }
        - name: itemCode
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/statusQuery'
      responses:
        '200':
          description: List of CSO documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsoResponse'
    post:
      tags: [CSO]
      summary: Create a new CSO document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsoRequest'
            example:
              company: COMP01
              store: STORE01
              customerCode: CUST001
              customerBranch: BRANCH01
              customerEmail: customer@example.com
              supplierCode: SUPP001
              supplierContract: CONTRACT-2024-001
              autoGenerateCsdo: false
              note: Q1 stock order
              createdBy: user01
              createdMethod: MANUAL
              items:
                - itemCode: ITEM001
                  qty: 50
                  uom: PCS
      responses:
        '200':
          description: CSO created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsoResponse'

  /consignment/api/cso/{id}:
    get:
      tags: [CSO]
      summary: Get CSO by ID
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSO detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsoResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [CSO]
      summary: Delete a CSO document (only HELD status)
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '204':
          description: Deleted

  /consignment/api/cso/{id}/release:
    put:
      tags: [CSO]
      summary: Release a CSO (HELD → RELEASED | ERROR)
      description: |
        Triggers reservation posting (Allocate + Forecast).
        If `autoGenerateCsdo` is true, a CSDO is automatically created.
      parameters:
        - $ref: '#/components/parameters/idPath'
        - name: X-User
          in: header
          required: false
          schema: { type: string }
          description: Username of the person releasing
      responses:
        '200':
          description: CSO released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsoResponse'

  /consignment/api/acmm/cso/auto-create:
    post:
      tags: [CSO]
      summary: Auto-create CSO from ACMM/POS integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsoRequest'
      responses:
        '200':
          description: CSO auto-created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsoResponse'

  # ─────────────────────────────────────────────
  # CSDO - Customer Delivery Order
  # ─────────────────────────────────────────────
  /consignment/api/csdo:
    get:
      tags: [CSDO]
      summary: Search CSDO documents
      parameters:
        - $ref: '#/components/parameters/companyQuery'
        - $ref: '#/components/parameters/storeQuery'
        - name: customerCode
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/statusQuery'
        - name: createdMethod
          in: query
          schema: { type: string }
        - name: referenceNo
          in: query
          schema: { type: string }
        - name: itemCode
          in: query
          schema: { type: string }
      responses:
        '200':
          description: List of CSDO documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsdoResponse'

  /consignment/api/csdo/{id}:
    get:
      tags: [CSDO]
      summary: Get CSDO by ID
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSDO detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsdoResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /consignment/api/csdo/transfer/{csoId}:
    post:
      tags: [CSDO]
      summary: Create CSDO by transferring from a released CSO
      parameters:
        - name: csoId
          in: path
          required: true
          schema: { type: string }
          description: ID of the source CSO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsdoTransferRequest'
            example:
              requireGenerateCdo: false
              shippingMode: COURIER
              transporter: JNE
              createdBy: user01
      responses:
        '200':
          description: CSDO created from CSO
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsdoResponse'

  /consignment/api/csdo/{id}/release:
    put:
      tags: [CSDO]
      summary: Release a CSDO (HELD → RELEASED)
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSDO released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsdoResponse'

  /consignment/api/csdo/{id}/reverse:
    put:
      tags: [CSDO]
      summary: Reverse a CSDO (RELEASED → REVERSED)
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSDO reversed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsdoResponse'


  # ─────────────────────────────────────────────
  # CSR - Customer Stock Return
  # ─────────────────────────────────────────────
  /consignment/api/csr:
    get:
      tags: [CSR]
      summary: Search CSR documents
      parameters:
        - $ref: '#/components/parameters/companyQuery'
        - $ref: '#/components/parameters/storeQuery'
        - $ref: '#/components/parameters/supplierCodeQuery'
        - $ref: '#/components/parameters/supplierContractQuery'
        - $ref: '#/components/parameters/statusQuery'
        - name: createdBy
          in: query
          schema: { type: string }
        - name: referenceNo
          in: query
          schema: { type: string }
        - name: itemCode
          in: query
          schema: { type: string }
      responses:
        '200':
          description: List of CSR documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsrResponse'
    post:
      tags: [CSR]
      summary: Create a new CSR document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsrRequest'
            example:
              company: COMP01
              store: STORE01
              supplierCode: SUPP001
              supplierContract: CONTRACT-2024-001
              reasonCode: DEFECTIVE
              remark: Customer returned defective items
              createdBy: user01
              items:
                - itemCode: ITEM001
                  uom: PCS
                  qty: 10
      responses:
        '200':
          description: CSR created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrResponse'

  /consignment/api/csr/{id}:
    get:
      tags: [CSR]
      summary: Get CSR by ID
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSR detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /consignment/api/csr/{id}/release:
    put:
      tags: [CSR]
      summary: Release a CSR (HELD → RELEASED)
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSR released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrResponse'

  /consignment/api/csr/{id}/detail/{detailId}/actual-qty:
    put:
      tags: [CSR]
      summary: Update actual received quantity for a CSR detail line
      parameters:
        - $ref: '#/components/parameters/idPath'
        - name: detailId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsrActualQtyUpdateRequest'
            example:
              actualQty: 9
      responses:
        '200':
          description: Actual qty updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrResponse'

  /consignment/api/csr/{id}/complete:
    put:
      tags: [CSR]
      summary: Complete a CSR (RELEASED → COMPLETED) — deducts inventory
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: CSR completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrResponse'

  # ─────────────────────────────────────────────
  # CSA - Customer Stock Adjustment
  # ─────────────────────────────────────────────
  /consignment/api/csa:
    get:
      tags: [CSA]
      summary: Search CSA documents
      parameters:
        - $ref: '#/components/parameters/companyQuery'
        - $ref: '#/components/parameters/storeQuery'
        - name: transactionType
          in: query
          schema:
            type: string
            enum: [ADJ_IN, ADJ_OUT]
        - $ref: '#/components/parameters/statusQuery'
        - name: createdBy
          in: query
          schema: { type: string }
        - name: referenceNo
          in: query
          schema: { type: string }
      responses:
        '200':
          description: List of CSA documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsaResponse'
    post:
      tags: [CSA]
